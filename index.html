<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light">

<!-- ================= WELCOME PAGE ================= -->
<div id="welcomePage">

    <div class="mode-select">
        <label>Mode:</label>
        <select id="gameMode" onchange="setMode(this.value)">
            <option value="player">2 Player</option>
            <option value="computer">Play vs Computer</option>
        </select>

        <br><br>

        <label>Theme:</label>
        <div class="theme-buttons">
            <button type="button" onclick="setTheme('light')">Light</button>
            <button type="button" onclick="setTheme('dark')">Dark</button>
            <button type="button" onclick="setTheme('neon')">GameX</button>
        </div>
    </div>

    <h1>FUN Tic Tac Toe</h1>
    <h3>✨ 3 Rounds Challenge ✨</h3>

    <div class="form">
        <input type="text" id="p1" placeholder="Enter Player 1 Name">
        <input type="text" id="p2" placeholder="Enter Player 2 Name">

        <div class="difficulty-box" id="difficultyBox">
            <label>Difficulty:</label>
            <select id="difficulty" onchange="setDifficulty(this.value)">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>

        <button type="button" class="start-btn" onclick="startGame()">Start Game</button>
    </div>
</div>

<!-- ================= GAME PAGE ================= -->
<div id="gamePage" style="display:none; position:relative;">

    <button type="button" class="back-btn" onclick="goBack()">⬅ Back</button>

    <button type="button" id="soundBtn" class="sound-btn" onclick="toggleSound()">
        🔊 Sound On
    </button>

    <h1>Tic Tac Toe</h1>

    <table>
        <tr>
            <th>Player</th>
            <th>Symbol</th>
            <th>Score</th>
        </tr>
        <tr>
            <td id="name1">-</td>
            <td>X</td>
            <td id="score1">0</td>
        </tr>
        <tr>
            <td id="name2">-</td>
            <td>O</td>
            <td id="score2">0</td>
        </tr>
    </table>

    <h3 id="roundInfo"></h3>

    <div class="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <h2 id="status"></h2>
    <button type="button" onclick="nextRound()">Next Round</button>
</div>

<!-- ================= WINNER POPUP ================= -->
<div id="winnerPopup" class="popup" style="display:none;">
    <div class="popup-content">
        <h1 id="popupText"></h1>
        <button type="button" class="popup-back-btn" onclick="goBackFromPopup()">⬅ Back</button>
        <button type="button" id="restartBtn" class="restart-btn" onclick="restartGame()">🔄 Restart Game</button>
    </div>
</div>

<!-- ================= SOUND ================= -->
<audio id="clickSound" preload="auto">
    <source src="click.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
